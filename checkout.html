<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Complete your purchase securely at DesiMart Premium."
    />
    <title>Checkout - DesiMart Premium</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Plus Jakarta Sans"', "sans-serif"],
            },
            colors: {
              primary: "#FF5A24",
              primaryHover: "#E04A18",
              brand: "#1E293B",
            },
          },
        },
      };
    </script>
    <style>
      .glass {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }

      /* Custom Input Styles */
      .form-input {
        width: 100%;
        padding: 1rem 1.25rem;
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 0.75rem;
        font-size: 0.875rem;
        font-weight: 500;
        color: #1e293b;
        transition: all 0.3s ease;
      }
      .form-input:focus {
        outline: none;
        border-color: #ff5a24;
        box-shadow: 0 0 0 3px rgba(255, 90, 36, 0.1);
      }
      .form-input::placeholder {
        color: #94a3b8;
      }

      /* Custom Radio for Payment */
      .payment-radio:checked + div {
        border-color: #ff5a24;
        background-color: rgba(255, 90, 36, 0.05);
      }
      .payment-radio:checked + div .check-icon {
        opacity: 1;
        transform: scale(1);
      }
    </style>
  </head>
  <body
    class="bg-slate-50 text-slate-800 antialiased selection:bg-primary/20 selection:text-primary"
  >
    <!-- Minimal Header for Checkout -->
    <header class="w-full relative z-50 bg-white border-b border-slate-100">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-20">
          <a href="index.html" class="flex items-center gap-2 group">
            <div
              class="w-10 h-10 bg-primary/10 rounded-xl flex items-center justify-center text-primary transition-colors duration-300"
            >
              <i class="ri-shopping-basket-fill text-xl"></i>
            </div>
            <span class="text-2xl font-bold tracking-tight text-brand"
              >Desi<span class="text-primary">Mart</span></span
            >
          </a>

          <a
            href="cart.html"
            class="text-sm font-semibold text-slate-500 hover:text-primary flex items-center gap-1 transition-colors"
          >
            <i class="ri-arrow-left-s-line"></i> Return to Cart
          </a>
        </div>
      </div>
    </header>

    <main class="py-12 min-h-screen pb-32">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <!-- Progress Bar -->
        <div class="max-w-3xl mx-auto mb-12">
          <div
            class="relative flex justify-between items-center text-xs sm:text-sm font-bold text-slate-400"
          >
            <div
              class="absolute left-0 top-1/2 -translate-y-1/2 w-full h-1 bg-slate-200 rounded-full z-0"
            >
              <div
                class="h-full bg-primary rounded-full transition-all duration-1000 w-1/2"
              ></div>
            </div>

            <div class="relative z-10 flex flex-col items-center gap-2">
              <div
                class="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center shadow-md"
              >
                <i class="ri-check-line"></i>
              </div>
              <span class="text-brand">Cart</span>
            </div>

            <div class="relative z-10 flex flex-col items-center gap-2">
              <div
                class="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center shadow-md shadow-primary/20 ring-4 ring-primary/10"
              >
                2
              </div>
              <span class="text-brand">Shipping</span>
            </div>

            <div class="relative z-10 flex flex-col items-center gap-2">
              <div
                class="w-8 h-8 rounded-full bg-slate-100 text-slate-400 flex items-center justify-center border border-slate-200"
              >
                3
              </div>
              <span>Payment</span>
            </div>
          </div>
        </div>

        <div class="flex flex-col lg:flex-row gap-10">
          <!-- Left Column: Forms -->
          <div class="w-full lg:w-2/3 space-y-8">
            <!-- Express Checkout -->
            <div
              class="bg-white rounded-3xl p-8 border border-slate-100 shadow-sm relative overflow-hidden"
            >
              <div
                class="absolute top-0 right-0 w-32 h-32 bg-gradient-to-br from-purple-100 to-transparent opacity-50 rounded-bl-full pointer-events-none"
              ></div>
              <h2 class="text-lg font-bold text-brand mb-6 text-center">
                Express Checkout
              </h2>
              <div class="flex flex-col sm:flex-row gap-4">
                <button
                  class="flex-1 bg-black text-white rounded-xl py-3.5 flex items-center justify-center gap-2 font-semibold hover:bg-slate-800 transition-colors shadow-sm"
                >
                  <i class="ri-apple-fill text-xl"></i> Pay
                </button>
                <button
                  class="flex-1 bg-white border border-slate-200 text-slate-700 rounded-xl py-3.5 flex items-center justify-center gap-2 font-semibold hover:bg-slate-50 transition-colors shadow-sm"
                >
                  <i class="ri-google-fill text-xl text-blue-500"></i> Pay
                </button>
              </div>
              <div class="flex items-center my-6">
                <div class="flex-1 border-t border-slate-100"></div>
                <span
                  class="px-4 text-xs font-bold text-slate-400 uppercase tracking-widest"
                  >Or continue below</span
                >
                <div class="flex-1 border-t border-slate-100"></div>
              </div>
            </div>

            <!-- Contact & Shipping -->
            <div
              class="bg-white rounded-3xl p-6 sm:p-10 border border-slate-100 shadow-sm relative"
            >
              <h2 class="text-2xl font-extrabold text-brand mb-8">
                Shipping Information
              </h2>

              <div class="space-y-6">
                <div>
                  <h3
                    class="font-bold text-brand mb-4 text-sm uppercase tracking-wide"
                  >
                    Contact
                  </h3>
                  <input
                    type="email"
                    placeholder="Email Address"
                    class="form-input"
                    value="john.doe@example.com"
                  />
                </div>

                <div class="pt-4">
                  <h3
                    class="font-bold text-brand mb-4 text-sm uppercase tracking-wide"
                  >
                    Shipping Address
                  </h3>
                  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input
                      type="text"
                      placeholder="First Name"
                      class="form-input"
                      value="John"
                    />
                    <input
                      type="text"
                      placeholder="Last Name"
                      class="form-input"
                      value="Doe"
                    />
                    <input
                      type="text"
                      placeholder="Address"
                      class="form-input md:col-span-2"
                    />
                    <input
                      type="text"
                      placeholder="Apartment, suite, etc. (optional)"
                      class="form-input md:col-span-2"
                    />
                    <input type="text" placeholder="City" class="form-input" />
                    <select class="form-input text-slate-500 bg-white">
                      <option>United Kingdom</option>
                      <option>India</option>
                      <option>United States</option>
                    </select>
                    <input
                      type="text"
                      placeholder="Postcode"
                      class="form-input"
                    />
                    <input
                      type="tel"
                      placeholder="Phone Number"
                      class="form-input"
                    />
                  </div>
                </div>
              </div>
            </div>

            <!-- Payment Method -->
            <div
              class="bg-white rounded-3xl p-6 sm:p-10 border border-slate-100 shadow-sm relative"
            >
              <h2 class="text-2xl font-extrabold text-brand mb-2">
                Payment Option
              </h2>
              <p class="text-sm text-slate-500 mb-8">
                All transactions are secure and encrypted.
              </p>

              <div class="space-y-4">
                <!-- Card Option -->
                <label class="block relative cursor-pointer group">
                  <input
                    type="radio"
                    name="payment"
                    class="sr-only payment-radio"
                    checked
                  />
                  <div
                    class="border border-slate-200 rounded-xl p-6 transition-all duration-300 hover:border-primary/50 bg-white"
                  >
                    <div class="flex items-center justify-between">
                      <div class="flex items-center gap-4">
                        <div
                          class="w-6 h-6 rounded-full border-2 border-slate-200 flex items-center justify-center relative bg-white"
                        >
                          <div
                            class="w-3 h-3 bg-primary rounded-full opacity-0 scale-50 transition-all duration-300 check-icon"
                          ></div>
                        </div>
                        <span class="font-bold text-brand">Credit Card</span>
                      </div>
                      <div class="flex gap-2 text-2xl text-slate-600">
                        <i class="ri-visa-line"></i>
                        <i class="ri-mastercard-line"></i>
                      </div>
                    </div>

                    <!-- Card Form (Visible when active) -->
                    <div class="mt-6 space-y-4 border-t border-slate-100 pt-6">
                      <div class="relative">
                        <input
                          type="text"
                          placeholder="Card Number"
                          class="form-input pr-12"
                        />
                        <i
                          class="ri-lock-2-line absolute right-4 top-1/2 -translate-y-1/2 text-slate-400"
                        ></i>
                      </div>
                      <div class="grid grid-cols-2 gap-4">
                        <input
                          type="text"
                          placeholder="MM/YY"
                          class="form-input"
                        />
                        <input
                          type="text"
                          placeholder="CVC"
                          class="form-input"
                        />
                      </div>
                      <input
                        type="text"
                        placeholder="Name on Card"
                        class="form-input"
                      />
                    </div>
                  </div>
                </label>

                <!-- PayPal Option -->
                <label class="block relative cursor-pointer group">
                  <input
                    type="radio"
                    name="payment"
                    class="sr-only payment-radio"
                  />
                  <div
                    class="border border-slate-200 rounded-xl p-6 transition-all duration-300 hover:border-primary/50 bg-white"
                  >
                    <div class="flex items-center justify-between">
                      <div class="flex items-center gap-4">
                        <div
                          class="w-6 h-6 rounded-full border-2 border-slate-200 flex items-center justify-center relative bg-white"
                        >
                          <div
                            class="w-3 h-3 bg-primary rounded-full opacity-0 scale-50 transition-all duration-300 check-icon"
                          ></div>
                        </div>
                        <span class="font-bold text-brand">PayPal</span>
                      </div>
                      <i class="ri-paypal-fill text-2xl text-[#00457C]"></i>
                    </div>
                  </div>
                </label>
              </div>
            </div>
          </div>

          <!-- Right Column: Order Summary -->
          <div class="w-full lg:w-1/3">
            <div
              class="bg-white rounded-3xl p-6 sm:p-8 border border-slate-100 shadow-sm sticky top-0 sm:top-6 lg:top-28"
            >
              <h2
                class="font-bold text-xl text-brand mb-6 border-b border-slate-100 pb-4"
              >
                Your Order
              </h2>

              <!-- Items list -->
              <div
                id="checkout-items"
                class="space-y-4 mb-6 max-h-60 overflow-y-auto pr-2 no-scrollbar"
              >
                <!-- Injected by JS -->
              </div>

              <!-- Discount Code -->
              <div class="flex gap-2 mb-6 pt-4 border-t border-slate-100">
                <input
                  type="text"
                  placeholder="Discount code"
                  class="form-input !py-3 bg-slate-50"
                />
                <button
                  class="bg-slate-800 text-white px-4 rounded-xl font-bold hover:bg-black transition-colors"
                >
                  Apply
                </button>
              </div>

              <!-- Totals -->
              <div class="space-y-3 mb-6 text-sm font-medium">
                <div class="flex justify-between text-slate-500">
                  <span>Subtotal</span>
                  <span class="text-brand font-bold" id="checkout-subtotal"
                    >£0.00</span
                  >
                </div>
                <div class="flex justify-between text-slate-500">
                  <span>Shipping</span>
                  <span class="text-green-500 font-bold" id="checkout-shipping"
                    >Free</span
                  >
                </div>
                <div class="flex justify-between text-slate-500">
                  <span>Tax (5%)</span>
                  <span class="text-brand font-bold" id="checkout-tax"
                    >£0.00</span
                  >
                </div>
              </div>

              <div
                class="border-t border-slate-100 pt-6 mb-8 flex justify-between items-center text-brand"
              >
                <span class="text-lg font-bold">Total</span>
                <div class="text-right">
                  <span class="text-sm text-slate-400 font-medium mr-1"
                    >GBP</span
                  >
                  <span class="text-3xl font-extrabold" id="checkout-total"
                    >£0.00</span
                  >
                </div>
              </div>

              <button
                id="pay-btn"
                class="w-full relative group overflow-hidden bg-primary text-white py-4 rounded-xl font-bold text-lg shadow-xl shadow-primary/20 transition-all duration-300"
              >
                <div
                  class="absolute inset-0 w-full h-full bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-full group-hover:animate-[shimmer_1.5s_infinite]"
                ></div>
                <span class="relative flex items-center justify-center gap-2">
                  <i class="ri-lock-fill"></i> Pay Now
                </span>
              </button>
              <p class="text-center text-xs text-slate-400 mt-4 font-medium">
                <i class="ri-shield-check-line"></i> Safe & secure payment
              </p>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const cart = JSON.parse(localStorage.getItem("desiMartCart")) || [];
        const container = document.getElementById("checkout-items");

        if (cart.length === 0) {
          window.location.href = "cart.html";
          return;
        }

        let subtotal = 0;
        cart.forEach((item) => {
          const numericPrice = parseFloat(item.price.replace("£", ""));
          subtotal += numericPrice * item.qty;

          const itemDiv = document.createElement("div");
          itemDiv.className = "flex gap-4 items-center";
          itemDiv.innerHTML = `
                    <div class="relative w-16 h-16 bg-slate-50 rounded-lg flex-shrink-0 border border-slate-100 p-1">
                        <img src="${item.image}" alt="${item.title}" loading="lazy" class="w-full h-full object-contain mix-blend-multiply rounded">
                        <span class="absolute -top-2 -right-2 bg-slate-500 text-white text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center">${item.qty}</span>
                    </div>
                    <div class="flex-1">
                        <h4 class="font-bold text-sm text-brand line-clamp-2">${item.title}</h4>
                        <span class="text-xs text-slate-400 font-medium uppercase mt-1 block">${item.vendor}</span>
                    </div>
                    <div class="font-bold text-sm text-brand text-right w-16 whitespace-nowrap">
                        £${(numericPrice * item.qty).toFixed(2)}
                    </div>
                `;
          container.appendChild(itemDiv);
        });

        const tax = subtotal * 0.05;
        const shipping = subtotal > 30 ? 0 : 5.99;
        const total = subtotal + tax + shipping;

        document.getElementById("checkout-subtotal").textContent =
          `£${subtotal.toFixed(2)}`;
        document.getElementById("checkout-tax").textContent =
          `£${tax.toFixed(2)}`;
        document.getElementById("checkout-shipping").textContent =
          shipping === 0 ? "Free" : `£${shipping.toFixed(2)}`;
        document.getElementById("checkout-total").textContent =
          `£${total.toFixed(2)}`;

        document.getElementById("pay-btn").addEventListener("click", () => {
          localStorage.setItem("desiMartCart", "[]"); // clear cart
          const btn = document.getElementById("pay-btn");
          btn.innerHTML = `<i class="ri-loader-4-line animate-spin text-2xl"></i> Processing...`;
          btn.classList.add("opacity-80", "cursor-not-allowed");

          setTimeout(() => {
            alert(
              "Order Placed Successfully! Thank you for using the DesiMart Demo.",
            );
            window.location.href = "index.html";
          }, 2000);
        });
      });
    </script>
  </body>
</html>
